# Built-in Template resources - accessible by all users (user_id=0, namespace=system)
# These templates can be instantiated by users to create full inbox automation workflows.
---
apiVersion: agent.wecode.io/v1
kind: Template
metadata:
  name: daily-standup-summary
  namespace: system
spec:
  displayName: "Daily Standup Summary"
  description: "Collect team standup reports and generate a structured summary with key highlights and blockers."
  category: inbox
  tags:
    - standup
    - summary
    - team
  icon: "📋"
  resources:
    ghost:
      systemPrompt: |
        You are a daily standup summarizer. When you receive messages,
        extract the following from each: what was done yesterday,
        what is planned today, and any blockers. Compile a structured
        summary with sections for each person, highlight cross-team
        dependencies, and list all blockers at the top.
    bot:
      shellName: Chat
    team:
      collaborationModel: pipeline
    subscription:
      promptTemplate: |
        Please process the following standup report and
        generate a structured summary:

        {{inbox_message}}
      retryCount: 1
      timeoutSeconds: 300
    queue:
      visibility: private
      triggerMode: immediate
status:
  state: Available
---
apiVersion: agent.wecode.io/v1
kind: Template
metadata:
  name: bug-report-handler
  namespace: system
spec:
  displayName: "Bug Report Handler"
  description: "Receive bug reports, automatically classify severity and priority, and output structured issue details."
  category: inbox
  tags:
    - bug
    - triage
    - issue
  icon: "🐛"
  resources:
    ghost:
      systemPrompt: |
        You are a bug report analyst. For each incoming bug report,
        identify: severity (critical/major/minor/trivial),
        affected component, steps to reproduce, expected vs actual
        behavior, and suggested priority. Output a structured report
        in markdown format.
    bot:
      shellName: Chat
    team:
      collaborationModel: pipeline
    subscription:
      promptTemplate: |
        Analyze the following bug report and provide a structured
        classification:

        {{inbox_message}}
      retryCount: 2
      timeoutSeconds: 300
    queue:
      visibility: private
      triggerMode: immediate
status:
  state: Available
---
apiVersion: agent.wecode.io/v1
kind: Template
metadata:
  name: customer-feedback-collector
  namespace: system
spec:
  displayName: "Customer Feedback Collector"
  description: "Collect customer feedback, extract key requirements, and produce structured analysis."
  category: inbox
  tags:
