# Override file for building images from source code
# Usage: docker compose -f docker-compose.yml -f docker-compose.build.yml up -d

services:
  backend:
    build:
      dockerfile: docker/backend/Dockerfile
    pull_policy: build

  frontend:
    build:
      dockerfile: docker/frontend/Dockerfile
    pull_policy: build

  chat_shell:
    build:
      dockerfile: docker/chat_shell/Dockerfile
    pull_policy: build

  executor_manager:
    build:
      dockerfile: docker/executor_manager/Dockerfile
    pull_policy: build

  knowledge_runtime:
    build:
      dockerfile: docker/knowledge_runtime/Dockerfile
    pull_policy: build
