[pytest]
testpaths = tests
norecursedirs = tests/manual
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
asyncio_mode = auto
markers =
    unit: Unit tests
    integration: Integration tests
