# Unified Pod Template for both regular tasks and warm pool standby pods.
# Use is_warm_pool=true for standby pods, which:
# - Sets PRELOAD_MODE=true env var
# - Task payload is dispatched by executor_manager after pod is ready
# - Reads AUTH_TOKEN, TASK_ID, CALLBACK_URL from Downward API mounted files
# - Mounts wegent-config volume for dynamic config via Downward API

apiVersion: v1
kind: Pod
metadata:
  name: {{ executor_name }}
  namespace: {{ namespace }}
  annotations:
    aigc.weibo.com/email: "weibo_ai_coding@staff.sina.com"
    kubus.weibo.com/pod-resource: '{"cpu":"2","memory":"4Gi"}'
    kubus.weibo.com/custom-dlc-mem-high-factor: "0.8"
  labels:
    aigc.weibo.com/team-mode: "{{ mode }}"
    app: {{ executor_name }}
    aigc.weibo.com/devContainerType: "darkFactory"
    aigc.weibo.com/executor: "wegent"
    aigc.weibo.com/executor-task-id: "{{ task_id }}"
    aigc.weibo.com/user: "{{ username }}"
    aigc.weibo.com/proxy-user: "{{ username }}"
    aigc.weibo.com/task-type: "{{ task_type }}"
    krs.weibo.com/managed-by: "krs"
    kubus.weibo.com/qos-class: "dlc"
    krs.weibo.com/type: "online"
    admission-webhook.kubus.weibo.com/pod-global-injector-v2: "enabled"
    {% if is_warm_pool %}
    # Warm pool labels
    aigc.weibo.com/warm-pool: "true"
    aigc.weibo.com/pool-state: "{{ pool_state }}"
    # Dynamic config labels for Downward API (updated at bind time)
    aigc.weibo.com/auth-token: "{{ auth_token }}"
    aigc.weibo.com/callback-url: "{{ callback_url }}"
    aigc.weibo.com/heartbeat-id: "{{ heartbeat_id }}"
    {% endif %}
spec:
  {% if init_container %}
  initContainers:
    - name: {{ init_container.name }}
      image: {{ init_container.image }}
      imagePullPolicy: {{ init_container.imagePullPolicy }}
      command: {{ init_container.command | tojson }}
      volumeMounts:
        {{ init_container.volumeMounts | to_nice_yaml | indent(8) }}
  {% endif %}
  containers:
    - name: {{ executor_name }}
      image: {{ image }}
      imagePullPolicy: Always
      {% if container_entrypoint %}
      command: ["{{ container_entrypoint }}"]
      {% endif %}
      ports:
        - containerPort: 8080
          name: https
          protocol: TCP
      env:
        - name: REGION
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['topology.weibo.com/region']
        {% if is_warm_pool %}
        # Warm pool mode indicator
        - name: WARM_POOL_MODE
          value: "true"
        - name: PRELOAD_MODE
          value: "true"
        # NOTE: AUTH_TOKEN, TASK_ID, CALLBACK_URL read from Downward API files
        {% else %}
        - name: AUTH_TOKEN
          value: {{ auth_token }}
        - name: TASK_ID
          value: "{{ task_id }}"
        - name: CALLBACK_URL
          value: {{ callback_url }}
        {% endif %}
        - name: EXECUTOR_NAME
          value: {{ executor_name }}
        - name: EXECUTOR_NAMESPACE
          value: {{ namespace }}
        - name: TZ
          value: Asia/Shanghai
        - name: LANG
          value: en_US.UTF-8
        - name: PORT
          value: "8080"
        - name: EXECUTOR_ENV
          value: |-
            {{ executor_env }}
        - name: REPO_PROXY_CONFIG
          value: |-
            {{ repo_proxy_config }}
        - name: TASK_API_DOMAIN
          value: {{ task_api_domain }}
        - name: DEBUG_RUN
          value: DEBUG
        - name: ENABLE_CODE_REVIEW_PROCESSING
          value: enable
        - name: CUSTOM_CONFIG
          value: |-
            {{ executor_custom_config }}
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        {% if use_base_image %}
        - name: USE_BASE_IMAGE
          value: "true"
        {% endif %}
        {% if is_warm_pool %}
        # Heartbeat for warm pool pods
        - name: HEARTBEAT_TYPE
          value: "warm_pool"
        - name: HEARTBEAT_ENABLED
          value: "true"
        - name: EXECUTOR_MANAGER_HEARTBEAT_BASE_URL
          value: "{{ executor_manager_heartbeat_base_url }}"
        {% elif heartbeat_id and heartbeat_type %}
        # Heartbeat monitoring for OOM detection (sandbox + regular tasks)
        - name: HEARTBEAT_ID
          value: "{{ heartbeat_id }}"
        - name: HEARTBEAT_TYPE
          value: "{{ heartbeat_type }}"
        - name: HEARTBEAT_ENABLED
          value: "true"
        - name: EXECUTOR_MANAGER_HEARTBEAT_BASE_URL
          value: "{{ executor_manager_heartbeat_base_url }}"
        {% endif %}
        {% if is_sandbox and sandbox_id %}
        # Sandbox ID for e2b protocol (backward compatibility)
        - name: SANDBOX_ID
          value: "{{ sandbox_id }}"
        {% endif %}
        {% if otel_enabled %}
        # OpenTelemetry configuration environment variables
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "{{ otel_service_name }}"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "{{ otel_otlp_endpoint }}"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "{{ otel_sampler_ratio }}"
        - name: OTEL_METRICS_ENABLED
          value: "{{ 'true' if otel_metrics_enabled else 'false' }}"
        - name: OTEL_CAPTURE_REQUEST_HEADERS
          value: "{{ 'true' if otel_capture_request_headers else 'false' }}"
        - name: OTEL_CAPTURE_REQUEST_BODY
          value: "{{ 'true' if otel_capture_request_body else 'false' }}"
        - name: OTEL_CAPTURE_RESPONSE_HEADERS
          value: "{{ 'true' if otel_capture_response_headers else 'false' }}"
        - name: OTEL_CAPTURE_RESPONSE_BODY
          value: "{{ 'true' if otel_capture_response_body else 'false' }}"
        - name: OTEL_MAX_BODY_SIZE
          value: "{{ otel_max_body_size }}"
        {% endif %}
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      volumeMounts:
        - name: dev-container-type
          mountPath: /root/.config/dev-container-type
          readOnly: true
        - name: user
          mountPath: /root/.config/user
          readOnly: true
        - name: email
          mountPath: /root/.config/email
          readOnly: true
        - name: wecode-ide
          mountPath: /root/.local/share/code-server/cert
          readOnly: true
        {% if is_warm_pool %}
        # Warm pool dynamic config via Downward API
        - name: wegent-config
          mountPath: /root/.wegent/.config
          readOnly: true
        {% endif %}
        {% if volume_mounts %}
        {{ volume_mounts | to_nice_yaml | indent(8) }}
        {% endif %}
  dnsConfig:
    options:
      - name: ndots
        value: "2"
  dnsPolicy: ClusterFirst
  priorityClassName: krs-high-priority
  schedulerName: krs-scheduler
  securityContext: {}
  terminationGracePeriodSeconds: 60
  tolerations:
    - effect: NoSchedule
      key: virtual-kubelet.io/provider
      value: weibo
  volumes:
    - name: wecode-ide
      secret:
        defaultMode: 256
        secretName: wecode-ide
    - name: dev-container-type
      downwardAPI:
        defaultMode: 420
        items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['aigc.weibo.com/devContainerType']
            path: data
    - name: user
      downwardAPI:
        defaultMode: 420
        items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['aigc.weibo.com/proxy-user']
            path: data
    - name: email
      downwardAPI:
        defaultMode: 420
        items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.annotations['aigc.weibo.com/email']
            path: data
    {% if is_warm_pool %}
    # Warm pool dynamic config - Downward API mounting labels to files
    - name: wegent-config
      downwardAPI:
        defaultMode: 420
        items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['aigc.weibo.com/auth-token']
            path: auth_token
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['aigc.weibo.com/executor-task-id']
            path: task_id
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['aigc.weibo.com/callback-url']
            path: callback_url
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['aigc.weibo.com/heartbeat-id']
            path: heartbeat_id
    {% endif %}
    {% if volumes %}
    {{ volumes | to_nice_yaml | indent(4) }}
    {% endif %}
  restartPolicy: Never
