apiVersion: v1
kind: Pod
metadata:
  name: {{ executor_name }}
  namespace: {{ namespace }}
  annotations:
    aigc.weibo.com/email: "weibo_ai_coding@staff.sina.com"
    kubus.weibo.com/pod-resource: '{"cpu":"2","memory":"8Gi"}'
  labels:
    aigc.weibo.com/team-mode: "{{ mode }}"
    app: {{ executor_name }}
    aigc.weibo.com/devContainerType: "darkFactory"
    aigc.weibo.com/executor: "wegent"
    aigc.weibo.com/executor-task-id: "{{ task_id }}"
    aigc.weibo.com/user: "{{ username }}"
    aigc.weibo.com/proxy-user: "{{ username }}"
    aigc.weibo.com/task-type: "{{ task_type }}"
    krs.weibo.com/managed-by: "krs"
    kubus.weibo.com/qos-class: "dlc"
    krs.weibo.com/type: "online"
    admission-webhook.kubus.weibo.com/pod-global-injector-v2: "enabled"
spec:
  {% if init_container %}
  initContainers:
    - name: {{ init_container.name }}
      image: {{ init_container.image }}
      imagePullPolicy: {{ init_container.imagePullPolicy }}
      command: {{ init_container.command | tojson }}
      volumeMounts:
        {{ init_container.volumeMounts | to_nice_yaml | indent(8) }}
  {% endif %}
  containers:
    - name: {{ executor_name }}
      image: {{ image }}
      imagePullPolicy: Always
      {% if container_entrypoint %}
      command: ["{{ container_entrypoint }}"]
      {% endif %}
      ports:
        - containerPort: 8080
          name: https
          protocol: TCP
      env:
        - name: REGION
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['topology.weibo.com/region']
        {% if not is_sandbox %}
        - name: TASK_INFO
          value: |-
            {{ task_str }}
        {% endif %}
        - name: EXECUTOR_NAME
          value: {{ executor_name }}
        - name: EXECUTOR_NAMESPACE
          value: {{ namespace }}
        - name: TZ
          value: Asia/Shanghai
        - name: LANG
          value: en_US.UTF-8
        - name: PORT
          value: "8080"
        - name: EXECUTOR_ENV
          value: |-
            {{ executor_env }}
        - name: REPO_PROXY_CONFIG
          value: |-
            {{ repo_proxy_config }}
        - name: TASK_API_DOMAIN
          value: {{ task_api_domain }}
        - name: DEBUG_RUN
          value: DEBUG
        - name: CALLBACK_URL
          value: http://wegent-executor-manager-web.wb-plat-ide:8080/executor-manager/callback
        - name: ENABLE_CODE_REVIEW_PROCESSING
          value: enable
        - name: CUSTOM_CONFIG
          value: |-
            {{ executor_custom_config }}
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        {% if use_base_image %}
        - name: USE_BASE_IMAGE
          value: "true"
        {% endif %}
        {% if is_sandbox and sandbox_id %}
        # Sandbox/Subagent support for e2b protocol
        - name: SANDBOX_ID
          value: "{{ sandbox_id }}"
        - name: HEARTBEAT_ENABLED
          value: "true"
        - name: EXECUTOR_MANAGER_HEARTBEAT_BASE_URL
          value: "{{ executor_manager_heartbeat_base_url }}"
        {% endif %}
        {% if otel_enabled %}
        # OpenTelemetry configuration environment variables
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "{{ otel_service_name }}"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "{{ otel_otlp_endpoint }}"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "{{ otel_sampler_ratio }}"
        - name: OTEL_METRICS_ENABLED
          value: "{{ 'true' if otel_metrics_enabled else 'false' }}"
        - name: OTEL_CAPTURE_REQUEST_HEADERS
          value: "{{ 'true' if otel_capture_request_headers else 'false' }}"
        - name: OTEL_CAPTURE_REQUEST_BODY
          value: "{{ 'true' if otel_capture_request_body else 'false' }}"
        - name: OTEL_CAPTURE_RESPONSE_HEADERS
          value: "{{ 'true' if otel_capture_response_headers else 'false' }}"
        - name: OTEL_CAPTURE_RESPONSE_BODY
          value: "{{ 'true' if otel_capture_response_body else 'false' }}"
        - name: OTEL_MAX_BODY_SIZE
          value: "{{ otel_max_body_size }}"
        {% endif %}
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      volumeMounts:
        - name: dev-container-type
          mountPath: /root/.config/dev-container-type
          readOnly: true
        - name: user
          mountPath: /root/.config/user
          readOnly: true
        - name: email
          mountPath: /root/.config/email
          readOnly: true
        - name: wecode-ide
          mountPath: /root/.local/share/code-server/cert
          readOnly: true
        {% if volume_mounts %}
        {{ volume_mounts | to_nice_yaml | indent(8) }}
        {% endif %}
  dnsConfig:
    options:
      - name: ndots
        value: "2"
  dnsPolicy: ClusterFirst
  priorityClassName: krs-high-priority
  schedulerName: krs-scheduler
  securityContext: {}
  terminationGracePeriodSeconds: 60
  tolerations:
    - effect: NoSchedule
      key: virtual-kubelet.io/provider
      value: weibo
  volumes:
    - name: wecode-ide
      secret:
        defaultMode: 256
        secretName: wecode-ide
    - name: dev-container-type
      downwardAPI:
        defaultMode: 420
        items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['aigc.weibo.com/devContainerType']
            path: data
    - name: user
      downwardAPI:
        defaultMode: 420
        items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['aigc.weibo.com/proxy-user']
            path: data
    - name: email
      downwardAPI:
        defaultMode: 420
        items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.annotations['aigc.weibo.com/email']
            path: data
    {% if volumes %}
    {{ volumes | to_nice_yaml | indent(4) }}
    {% endif %}
  restartPolicy: Never

