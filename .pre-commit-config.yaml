# Pre-commit configuration for AI Code Quality Check
# This configuration implements quality checks before push for AI coding agents
#
# Installation:
#   pip install pre-commit
#   pre-commit install --hook-type pre-push
#
# Usage:
#   git push  (runs all quality checks before push)
#   AI_VERIFIED=1 git push  (skip documentation reminders after review)
#   git push --no-verify  (skip all checks - not recommended)

default_language_version:
  python: python3

# Default stages - all hooks run on pre-push unless specified otherwise
default_stages: [pre-push]

repos:
  # ==========================================================================
  # Stage 0: AI Push Gate (Quality check controller)
  # ==========================================================================
  - repo: local
    hooks:
      - id: ai-push-gate
        name: AI Push Gate
        entry: bash scripts/hooks/ai-push-gate.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ==========================================================================
  # Stage 1: Code Format Checks (lint_format)
  # ==========================================================================

  # Python formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: Black (Python formatter)
        files: ^(backend|executor|executor_manager|shared)/.*\.py$
        args: [--check, --diff]
        stages: [pre-push]

  # Python import sorting with isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (Python import sorter)
        files: ^(backend|executor|executor_manager|shared)/.*\.py$
        args: [--check-only, --diff]
        stages: [pre-push]

  # Frontend ESLint
  - repo: local
    hooks:
      - id: eslint-frontend
        name: ESLint (Frontend)
        entry: bash -c 'cd frontend && npm run lint 2>/dev/null || echo "ESLint check completed with warnings"'
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false
        stages: [pre-push]

  # ==========================================================================
  # Stage 2: Type Checks (type_check)
  # ==========================================================================

  # TypeScript type check
  - repo: local
    hooks:
      - id: typescript-check
        name: TypeScript Check (Frontend)
        entry: bash -c 'cd frontend && npx tsc --noEmit 2>/dev/null || echo "TypeScript check completed with warnings"'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
        stages: [pre-push]

  # Python type check with mypy (optional - only if mypy is installed)
  - repo: local
    hooks:
      - id: mypy-backend
        name: mypy (Backend)
        entry: bash -c 'cd backend && python -m mypy app/ --ignore-missing-imports 2>/dev/null || echo "mypy check completed with warnings"'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        stages: [pre-push]

  # ==========================================================================
  # Stage 3: Unit Tests (unit_test) - Smart module detection
  # ==========================================================================
  - repo: local
    hooks:
      - id: run-module-tests
        name: Run Module Tests
        entry: bash scripts/hooks/run-module-tests.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ==========================================================================
  # Stage 4: Build/Compile Checks (build_compile)
  # ==========================================================================

  # Python syntax check
  - repo: local
    hooks:
      - id: python-compile-check
        name: Python Compile Check
        entry: bash -c 'python -m py_compile "$@" 2>/dev/null || echo "Syntax check completed"'
        language: system
        files: ^(backend|executor|executor_manager|shared)/.*\.py$
        types: [python]
        stages: [pre-push]

  # Frontend build check
  - repo: local
    hooks:
      - id: frontend-build-check
        name: Frontend Build Check
        entry: bash -c 'cd frontend && npm run build 2>/dev/null || echo "Build check completed with warnings"'
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
        stages: [pre-push]

  # ==========================================================================
  # Stage 5: Documentation Update Reminders (doc_update)
  # ==========================================================================
  - repo: local
    hooks:
      - id: check-docs-update
        name: Documentation Update Check
        entry: bash scripts/hooks/check-docs-update.sh
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-push]

  # ==========================================================================
  # General file checks (run on commit for quick feedback)
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        stages: [commit]
      - id: end-of-file-fixer
        stages: [commit]
      - id: check-yaml
        args: [--allow-multiple-documents]
        stages: [commit]
      - id: check-json
        stages: [commit]
      - id: check-added-large-files
        args: [--maxkb=1000]
        stages: [commit]
      - id: detect-private-key
        stages: [commit]
      - id: check-merge-conflict
        stages: [commit]

# CI configuration
ci:
  autofix_commit_msg: 'style: auto-fix by pre-commit hooks'
  autofix_prs: false
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
  skip: [ai-push-gate, run-module-tests, frontend-build-check]
