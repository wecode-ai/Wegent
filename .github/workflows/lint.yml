name: Lint

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

jobs:
  lint-backend:
    name: Lint Backend (Black & isort)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          source $HOME/.cargo/env

      - name: Install dependencies
        working-directory: ./backend
        run: |
          source $HOME/.cargo/env
          uv sync --dev

      - name: Run Black format check
        working-directory: ./backend
        run: |
          source $HOME/.cargo/env
          uv run black --check app/

      - name: Run isort check
        working-directory: ./backend
        run: |
          source $HOME/.cargo/env
          uv run isort --check-only --diff app/

  lint-knowledge-engine:
    name: Lint Knowledge Engine (Black & isort)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          source $HOME/.cargo/env

      - name: Install dependencies
        working-directory: ./knowledge_engine
        run: |
          source $HOME/.cargo/env
          uv sync --dev

      - name: Run Black format check
        working-directory: ./knowledge_engine
        run: |
          source $HOME/.cargo/env
          uv run black --check knowledge_engine tests

      - name: Run isort check
        working-directory: ./knowledge_engine
        run: |
          source $HOME/.cargo/env
          uv run isort --check-only --diff knowledge_engine tests

  lint-frontend:
    name: Lint Frontend (ESLint & TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: ./pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm --filter wecode-ai-assistant lint

      - name: Run TypeScript check
        run: pnpm --filter wecode-ai-assistant exec tsc --noEmit

  lint-wework:
    name: Lint Wework (ESLint & TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: ./pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm --filter wework lint

      - name: Run TypeScript check
        run: pnpm --filter wework typecheck

  check-settings-config:
    name: Check Settings Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run settings configuration check
        run: |
          chmod +x ./scripts/hooks/check-settings-config.sh
          ./scripts/hooks/check-settings-config.sh

      - name: Run repository policy check
        # Fork PRs run this in repository-policy.yml using pull_request_target
        # with the trusted base-branch script and the PR merge tree as data.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          REPOSITORY_POLICY_PATTERN_B64: ${{ vars.RESTRICTED_DOMAIN_PATTERN_B64 }}
          REPOSITORY_POLICY_APPROVED_B64: ${{ vars.APPROVED_DOMAIN_REFERENCES_B64 }}
        run: |
          chmod +x ./scripts/hooks/check-repository-policy.sh
          ./scripts/hooks/check-repository-policy.sh

  check-alembic-heads:
    name: Check Alembic Multi-Head
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Alembic multi-head check
        run: |
          chmod +x ./scripts/hooks/check-alembic-heads.sh
          ./scripts/hooks/check-alembic-heads.sh

  lint-summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-knowledge-engine, lint-frontend, lint-wework, check-settings-config, check-alembic-heads]
    if: always()

    steps:
      - name: Check lint results
        run: |
          echo "All lint jobs completed"
          if [[ "${{ needs.lint-backend.result }}" == "failure" ]] || \
             [[ "${{ needs.lint-knowledge-engine.result }}" == "failure" ]] || \
             [[ "${{ needs.lint-frontend.result }}" == "failure" ]] || \
             [[ "${{ needs.lint-wework.result }}" == "failure" ]] || \
             [[ "${{ needs.check-settings-config.result }}" == "failure" ]] || \
             [[ "${{ needs.check-alembic-heads.result }}" == "failure" ]]; then
            echo "One or more lint jobs failed"
            exit 1
          fi
