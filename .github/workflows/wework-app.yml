name: Wework App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional Wework version override, for example 0.1.0 or v0.1.0. If empty, auto-increment from latest wework-vX.Y.Z tag"
        type: string
        required: false
  push:
    tags:
      - "wework-v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Wework release version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          validate_version() {
            local version="$1"
            if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Error: Invalid Wework version '$version'. Expected MAJOR.MINOR.PATCH, for example 1.2.3." >&2
              exit 1
            fi
          }

          bump_patch() {
            local version="$1"
            IFS='.' read -r major minor patch <<< "$version"
            echo "${major}.${minor}.$((patch + 1))"
          }

          if [ -n "${INPUT_VERSION:-}" ]; then
            version="${INPUT_VERSION#v}"
            validate_version "$version"
          elif [[ "${GITHUB_REF:-}" == refs/tags/wework-v* ]]; then
            version="${GITHUB_REF_NAME#wework-v}"
            validate_version "$version"
          else
            latest_tag="$(git tag -l 'wework-v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1 || true)"
            if [ -z "$latest_tag" ]; then
              version="0.0.1"
            else
              latest_version="${latest_tag#wework-v}"
              validate_version "$latest_version"
              version="$(bump_patch "$latest_version")"
            fi
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/wework-v* ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="wework-v$version"
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          release_title="Wework $RELEASE_VERSION"
          release_notes="$(mktemp)"
          generated_notes="$(mktemp)"
          previous_tag="$(git tag -l 'wework-v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | awk -v current="$RELEASE_TAG" '$0 != current { print; exit }')"

          if [ -n "$previous_tag" ]; then
            log_range="${previous_tag}..${GITHUB_SHA}"
          else
            log_range="$GITHUB_SHA"
          fi

          git log --no-merges --pretty=format:'- %s (%h)' "$log_range" -- wework/ executor/ > "$generated_notes"

          if [ ! -s "$generated_notes" ]; then
            echo "- No Wework app bundle changes detected under \`wework/\` or \`executor/\` since the previous Wework release." > "$generated_notes"
          fi

          {
            echo "## Changes"
            echo ""
            if [ -n "$previous_tag" ]; then
              echo "Changes under \`wework/\` or \`executor/\` since \`$previous_tag\`."
            else
              echo "Initial Wework release changes under \`wework/\` or \`executor/\`."
            fi
            echo ""
            cat "$generated_notes"
            echo ""
            echo "## macOS Distribution Notes"
            echo ""
            echo "Wework macOS DMG build."
            echo ""
            echo "This build is ad-hoc signed and not Apple notarized. On first launch, click Done if macOS shows a Move to Trash warning, then force-open it from System Settings > Privacy & Security > Open Anyway."
          } > "$release_notes"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$release_title" \
              --notes-file "$release_notes" \
              --prerelease
          else
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$release_title" \
              --notes-file "$release_notes" \
              --draft \
              --prerelease
          fi

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-14
    timeout-minutes: 45
    needs: prepare-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            rust_target: aarch64-apple-darwin
          - arch: x64
            rust_target: x86_64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rosetta 2
        if: matrix.arch == 'x64'
        run: |
          if ! /usr/bin/pgrep -q oahd; then
            sudo softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.rust_target }}

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Cargo dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            executor/target
            wework/src-tauri/target
          key: ${{ runner.os }}-wework-app-${{ matrix.rust_target }}-${{ hashFiles('executor/Cargo.lock', 'wework/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wework-app-${{ matrix.rust_target }}-

      - name: Build local executor sidecar
        working-directory: executor
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.rust_target }}"
          binary="target/${{ matrix.rust_target }}/release/wegent-executor"
          mkdir -p dist
          cp "$binary" dist/wegent-executor
          chmod 0755 dist/wegent-executor
          dist/wegent-executor --version

      - name: Prepare bundled Codex
        working-directory: wework
        env:
          WEWORK_CODEX_TARGET: ${{ matrix.rust_target }}
        run: pnpm run prepare:codex

      - name: Build Wework app bundle
        working-directory: wework
        env:
          VITE_API_BASE_URL: https://api.wecode.ai/api
          VITE_SOCKET_BASE_URL: https://api.wecode.ai
        run: |
          set -euo pipefail
          config_override="$(mktemp "$PWD/src-tauri/tauri.ci.XXXXXX.json")"
          cleanup() {
            rm -f "$config_override"
          }
          trap cleanup EXIT
          CONFIG_OVERRIDE="$config_override" VERSION="${{ needs.prepare-release.outputs.version }}" python3 - <<'PY'
          import json
          import os

          config = {
              "version": os.environ["VERSION"],
              "bundle": {
                  "macOS": {
                      "signingIdentity": "-",
                      "hardenedRuntime": True,
                  },
              },
          }

          with open(os.environ["CONFIG_OVERRIDE"], "w", encoding="utf-8") as handle:
              json.dump(config, handle, indent=2)
              handle.write("\n")
          PY
          pnpm exec tauri build \
            --target "${{ matrix.rust_target }}" \
            --bundles dmg \
            --config "$config_override"

      - name: Verify and collect DMG
        id: package
        shell: bash
        run: |
          set -euo pipefail
          dmg_source="$(find "wework/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg" -maxdepth 1 -name '*.dmg' -type f | sort | tail -1)"
          if [ -z "$dmg_source" ]; then
            echo "No .dmg bundle found" >&2
            exit 1
          fi
          hdiutil verify "$dmg_source"

          mount_dir="$RUNNER_TEMP/wework-dmg-${{ matrix.arch }}"
          rm -rf "$mount_dir"
          mkdir -p "$mount_dir"
          cleanup_mount() {
            hdiutil detach "$mount_dir" -quiet || true
          }
          trap cleanup_mount EXIT

          hdiutil attach "$dmg_source" -mountpoint "$mount_dir" -nobrowse -readonly
          app_path="$(find "$mount_dir" -maxdepth 1 -name '*.app' -type d | sort | tail -1)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found inside DMG" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign --display --verbose=4 "$app_path"
          if spctl --assess --type execute --verbose "$app_path"; then
            echo "Gatekeeper accepted the app bundle."
          else
            echo "::warning::Gatekeeper rejected this ad-hoc signed, non-notarized build. Users must click Done if macOS shows Move to Trash, then force-open it from System Settings > Privacy & Security > Open Anyway."
          fi
          cleanup_mount
          trap - EXIT

          artifact_dir="$RUNNER_TEMP/wework-macos-${{ matrix.arch }}"
          mkdir -p "$artifact_dir"
          dmg_path="$artifact_dir/WeWork_${{ needs.prepare-release.outputs.version }}_macos_${{ matrix.arch }}_unsigned-adhoc.dmg"
          cp "$dmg_source" "$dmg_path"
          shasum -a 256 "$dmg_path"
          {
            echo "### Wework macOS ${{ matrix.arch }} release asset"
            echo ""
            echo "- DMG: $(basename "$dmg_path")"
            echo "- This build is ad-hoc signed and not Apple notarized."
            echo "- If the first launch dialog shows Move to Trash, click Done instead."
            echo "- Then force-open from System Settings > Privacy & Security > Open Anyway."
            echo "- If macOS keeps the quarantine flag: \`xattr -dr com.apple.quarantine /Applications/WeWork.app\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"

      - name: Upload DMG to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "${{ steps.package.outputs.dmg_path }}" --clobber
          release_url="$(gh release view "$RELEASE_TAG" --json url --jq .url)"
          {
            echo ""
            echo "- Direct DMG download is available from: $release_url"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-macos

    steps:
      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release edit "$RELEASE_TAG" --draft=false --prerelease
          release_url="$(gh release view "$RELEASE_TAG" --json url --jq .url)"
          echo "Published direct DMG downloads: $release_url" >> "$GITHUB_STEP_SUMMARY"
