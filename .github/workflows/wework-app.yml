name: Wework App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Artifact version label, for example 0.1.0 or v0.1.0"
        type: string
        required: false
  push:
    tags:
      - "wework-v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-14
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            rust_target: aarch64-apple-darwin
          - arch: x64
            rust_target: x86_64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve artifact version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          input_version="${{ github.event.inputs.version }}"
          if [ -n "$input_version" ]; then
            version="${input_version#v}"
          elif [[ "${GITHUB_REF:-}" == refs/tags/wework-v* ]]; then
            version="${GITHUB_REF_NAME#wework-v}"
          else
            version="$(node -p "require('./wework/package.json').version")-${GITHUB_SHA::7}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rosetta 2
        if: matrix.arch == 'x64'
        run: |
          if ! /usr/bin/pgrep -q oahd; then
            sudo softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.rust_target }}

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Cargo dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            executor/target
            wework/src-tauri/target
          key: ${{ runner.os }}-wework-app-${{ matrix.rust_target }}-${{ hashFiles('executor/Cargo.lock', 'wework/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wework-app-${{ matrix.rust_target }}-

      - name: Build local executor sidecar
        working-directory: executor
        env:
          APP_VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.rust_target }}"
          binary="target/${{ matrix.rust_target }}/release/wegent-executor"
          mkdir -p dist
          cp "$binary" dist/wegent-executor
          chmod 0755 dist/wegent-executor
          WEGENT_EXECUTOR_VERSION="$APP_VERSION" dist/wegent-executor --version

      - name: Prepare bundled Codex
        working-directory: wework
        env:
          WEWORK_CODEX_TARGET: ${{ matrix.rust_target }}
        run: pnpm run prepare:codex

      - name: Build Wework app bundle
        working-directory: wework
        env:
          VITE_API_BASE_URL: https://api.wecode.ai/api
          VITE_SOCKET_BASE_URL: https://api.wecode.ai
        run: |
          set -euo pipefail
          config_override="$(mktemp "$PWD/src-tauri/tauri.ci.XXXXXX.json")"
          cleanup() {
            rm -f "$config_override"
          }
          trap cleanup EXIT
          CONFIG_OVERRIDE="$config_override" VERSION="${{ steps.version.outputs.value }}" python3 - <<'PY'
          import json
          import os

          config = {
              "version": os.environ["VERSION"],
              "bundle": {
                  "macOS": {
                      "signingIdentity": "-",
                  },
              },
          }

          with open(os.environ["CONFIG_OVERRIDE"], "w", encoding="utf-8") as handle:
              json.dump(config, handle, indent=2)
              handle.write("\n")
          PY
          pnpm exec tauri build \
            --target "${{ matrix.rust_target }}" \
            --bundles app \
            --config "$config_override"

      - name: Ad-hoc sign app bundle
        id: package
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find "wework/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos" -maxdepth 1 -name '*.app' -type d | sort | tail -1)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found" >&2
            exit 1
          fi

          codesign --force --deep --options runtime --sign - "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose "$app_path" || true

          artifact_dir="$RUNNER_TEMP/wework-macos-${{ matrix.arch }}"
          mkdir -p "$artifact_dir"
          app_name="$(basename "$app_path")"
          zip_path="$artifact_dir/WeWork_${{ steps.version.outputs.value }}_macos_${{ matrix.arch }}_unsigned-adhoc.app.zip"
          dmg_path="$artifact_dir/WeWork_${{ steps.version.outputs.value }}_macos_${{ matrix.arch }}_unsigned-adhoc.dmg"

          ditto -c -k --keepParent "$app_path" "$zip_path"
          hdiutil create \
            -volname "WeWork" \
            -srcfolder "$app_path" \
            -ov \
            -format UDZO \
            "$dmg_path"

          echo "artifact_dir=$artifact_dir" >> "$GITHUB_OUTPUT"
          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"

      - name: Write install note
        shell: bash
        run: |
          cat > "${{ steps.package.outputs.artifact_dir }}/README-macos-unsigned.txt" <<'EOF'
          This macOS build is ad-hoc signed but not Apple notarized.

          First launch may require:
          1. Open System Settings > Privacy & Security.
          2. Click Open Anyway for WeWork.

          If macOS keeps the download quarantine flag, run:
            xattr -dr com.apple.quarantine /Applications/WeWork.app
          EOF

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wework-macos-${{ matrix.arch }}-unsigned-adhoc
          path: ${{ steps.package.outputs.artifact_dir }}/*
          if-no-files-found: error
          retention-days: 14
