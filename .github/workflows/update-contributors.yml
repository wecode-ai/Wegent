name: Update Contributors

on:
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID || secrets.RELEASE_APP_ID || vars.RELEASE_APP_CLIENT_ID || secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.release-app-token.outputs.token }}

      - name: Update Contributors in README
        uses: akhilmhdh/contributors-readme-action@v2.3.11
        env:
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}
        with:
          auto_detect_branch_protection: false
          image_size: 80
          columns_per_row: 8
          readme_path: README.md
          committer_username: github-actions[bot]
          committer_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'docs: update contributors list'

      - name: Update Contributors in Chinese README
        uses: akhilmhdh/contributors-readme-action@v2.3.11
        env:
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}
        with:
          auto_detect_branch_protection: false
          image_size: 80
          columns_per_row: 8
          readme_path: README_zh.md
          committer_username: github-actions[bot]
          committer_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'docs: update contributors list (zh)'
